<html>
  <head>

    <title>Lyric Ninja | A Fruit Ninja Clone</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Retro fonts for billboard text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Background video (optional) -->
    <!-- Place a file named background.mp4 next to index.html, or update the src below. -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="background.mp4" type="video/mp4" />
      <!-- Optional formats
      <source src="background.webm" type="video/webm" />
      <source src="background.ogv" type="video/ogg" />
      -->
    </video>
    <!-- Game canvas -->
    <canvas id="c"></canvas>
    <!-- Lyrics overlay -->
    <div class="lyrics" aria-live="polite"></div>
    <!-- Gameplay HUD -->
    <div class="hud">
      <div class="level">
        <div class="level__time">--:--</div>
        <div class="level__bar"><div class="level__bar-fill"></div></div>
      </div>
      <div class="hud__score">
        <div class="score-lbl"></div>
        <div class="cube-count-lbl"></div>
      </div>
      <div class="pause-btn" title="Pause">
        <div></div>
      </div>
      <div class="slowmo">
        <div class="slowmo__bar"></div>
      </div>
    </div>
    <!-- Menu System -->
    <div class="menus">
      <div class="menu menu--main">
        <h1>Lyric Ninja</h1>
        <div class="now-playing">Now Playing: <span class="song-title">Psalm 150</span></div>
        <button type="button" class="play-normal-btn btn btn--primary">PLAY GAME</button>
        <button type="button" class="play-casual-btn btn btn--secondary">CASUAL MODE</button>
        <div class="credits">
          A game by lost boy found
        </div>
      </div>
      <div class="menu menu--pause">
        <h1>Paused</h1>
        <button type="button" class="resume-btn">RESUME GAME</button>
        <button type="button" class="menu-btn--pause">MAIN MENU</button>
        <div class="social">
          <button type="button" class="btn social-btn insta-btn">Follow on Instagram</button>
          <button type="button" class="btn social-btn share-btn">Share</button>
          <button type="button" class="btn social-btn music-btn">Our Music</button>
        </div>
      </div>
      <div class="menu menu--score">
        <h1 class="score-title">Game Over</h1>
        <h2>Your Score:</h2>
        <div class="final-score-lbl"></div>
        <div class="high-score-lbl"></div>
        <button type="button" class="play-again-btn">PLAY AGAIN</button>
        <button type="button" class="menu-btn--score">MAIN MENU</button>
        <div class="social">
          <button type="button" class="btn social-btn insta-btn">Follow on Instagram</button>
          <button type="button" class="btn social-btn share-btn">Share</button>
          <button type="button" class="btn social-btn music-btn">Our Music</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
