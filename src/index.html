<!doctype html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2PBJPDNWKZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-2PBJPDNWKZ');

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>lost boy found - Christian AI</title>
  <meta name="description" content="Music + arcade. Follow, listen, and play. Pop-punk neon vibes." />
  <meta name="theme-color" content="#0b0b12" />
  <base href="/" />
  <!-- Anime.js for playful motion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root{
      --bg:#0b0b12; --bg2:#101026; --ink:#f8f8ff; --muted:#a6a8b3;
      --accent:#39FF14; --accent2:#e1ee2c; --card:#141428; --card2:#1b1b34;
      --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.04);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      color:var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      min-height: 100svh;
      background:
        radial-gradient(1200px 600px at 10% -10%, #1b1b34 0%, transparent 60%),
        radial-gradient(1200px 600px at 100% 0%, #102338 0%, transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      padding:
        calc(20px + env(safe-area-inset-top))
        calc(16px + env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        calc(16px + env(safe-area-inset-left));
    }
    .lbf-wrap{ max-width: 720px; margin: 0 auto; }
    .lbf-header{ text-align:center; margin-bottom:14px; opacity:0 }
    .lbf-avatar{ width:84px; height:84px; border-radius:50%; box-shadow:var(--shadow); }
    .lbf-title{ margin:10px 0 4px; font-size: clamp(22px, 5.5vw, 28px); }
    .lbf-tag{ margin:0 auto 14px; color:var(--muted); font-size: clamp(12px, 3.6vw, 14px); max-width: 36ch; }

    .lbf-feature{ display:block; position:relative; border-radius:16px; overflow:hidden; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,.08); margin: 12px 0 18px; text-decoration:none; color:inherit; opacity:0 }
    .lbf-feature-media{ height:160px; background-size:cover; background-position:center; filter: contrast(1.1) saturate(1.1); }
    .lbf-feature-meta{ position:absolute; inset:auto 10px 10px 10px; background: linear-gradient(180deg, rgba(0,0,0,.0), rgba(0,0,0,.55)); padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.05); }
    .lbf-eyebrow{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .lbf-feature-title{ font-size:16px; font-weight:600; }
    .lbf-cta{ font-size:13px; color: var(--accent2); }

    .lbf-list{ display:flex; flex-direction:column; gap:10px; }
    .lbf-card{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 14px; border-radius:14px; text-decoration:none; color:inherit; background:linear-gradient(180deg, var(--card), var(--card2)); border:1px solid rgba(255,255,255,.08); box-shadow:var(--shadow); opacity:0 }
    .lbf-ico{ width:24px; height:24px; display:grid; place-items:center; filter: drop-shadow(0 2px 8px rgba(0,0,0,.35)); }
    .lbf-label{ flex:1; font-weight:600; font-size:16px; }
    .lbf-arrow{ opacity:.6 }
    .lbf-card:active{ transform: translateY(1px) }
    .lbf-card:hover{ outline:1px solid rgba(57,255,20,.25) }

    /* Auth bar */
    .lbf-auth{ display:flex; gap:8px; justify-content:center; margin: 8px 0 12px; flex-wrap:wrap }
    .lbf-btn{ appearance:none; border:1px solid rgba(255,255,255,.12); background:linear-gradient(180deg, #1b1b34, #141428); color:#f8f8ff; border-radius:999px; padding:8px 12px; font-weight:600; box-shadow:var(--shadow); cursor:pointer }
    .lbf-btn:active{ transform: translateY(1px) }

    /* Song picker */
    .lbf-songs{ margin-top:14px; padding:10px 12px; border:1px solid rgba(255,255,255,.08); border-radius:14px; background:linear-gradient(180deg, #141428, #1b1b34); box-shadow:var(--shadow) }
    .lbf-songs h2{ margin:4px 0 8px; font-size:18px }
    .lbf-search{ display:flex; gap:8px; margin:8px 0 10px }
    .lbf-search input{ flex:1; border-radius:10px; padding:8px 10px; border:1px solid rgba(255,255,255,.12); background:#11131f; color:#fff }
    .lbf-album{ margin:8px 0 10px }
    .lbf-album-head{ display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none }
    .lbf-album h3{ margin:6px 0; font-size:15px; color:var(--muted); flex:1 }
    .lbf-cover{ width:36px; height:36px; border-radius:8px; background:#222; object-fit:cover; box-shadow:var(--shadow) }
    .lbf-toggle{ transform: rotate(0deg); transition: transform .15s ease; opacity:.8 }
    .lbf-album[data-collapsed="true"] .lbf-toggle{ transform: rotate(-90deg) }
    .lbf-song{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 0; border-top:1px dashed rgba(255,255,255,.07) }
    .lbf-song:first-child{ border-top:none }
    .lbf-song-title{ font-size:14px }
    .lbf-song-actions a{ color: var(--accent2); text-decoration:none; font-size:13px; margin-left:10px }
    .lbf-album[data-collapsed="true"] .lbf-song{ display:none }
  
    /* Holiday flag */
    .flag-holiday .lbf-title{ background: linear-gradient(90deg, #39FF14, #00E5FF, #FF2BD6); -webkit-background-clip:text; background-clip:text; color:transparent; }

    @media (min-width: 640px){
      .lbf-feature-media{ height:200px }
    }
  </style>
</head>
<body>
  <div class="lbf-wrap">
    <div id="app"></div>
  </div>
</body>
</html>
