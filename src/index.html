<!doctype html>
<html lang="en">
<head>

  <meta charset="utf-8" />

  <title>Christian AI Music</title>
  <meta name="description" content="Music + arcade. Follow, listen, and play. Pop-punk neon vibes." />
  <meta name="theme-color" content="#0b0b12" />
  <base href="/" />
  <!-- Anime.js for playful motion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
    :root{
      --bg:#f4f5f8;
      --bg-soft:#e7ebf3;
      --ink:#131624;
      --muted:#5e6476;
      --line:rgba(19,22,36,0.12);
      --radius-lg:28px;
      --radius-md:16px;
      --shadow-lg:0 18px 44px rgba(19,22,36,0.12);
      --shadow-sm:0 12px 28px rgba(19,22,36,0.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing:antialiased;
      color:var(--ink);
      background:
        radial-gradient(1400px 520px at -5% -10%, rgba(231,235,243,0.65), transparent 65%),
        radial-gradient(1200px 540px at 105% 0%, rgba(221,226,238,0.6), transparent 60%),
        linear-gradient(180deg,#ffffff 0%, var(--bg) 100%);
      padding:clamp(18px,4vw,36px);
      min-height:100svh;
    }
    a{color:inherit}
    .landing{
      margin:0 auto;
      max-width:min(1100px,100%);
      display:flex;
      flex-direction:column;
      gap:clamp(18px,4vw,32px);
    }
    .landing-hero{
      text-align:center;
      padding:clamp(26px,6vw,42px);
      border-radius:var(--radius-lg);
      background:linear-gradient(180deg,#ffffff 0%,rgba(244,246,252,0.92) 100%);
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-avatar{
      width:clamp(72px,18vw,96px);
      height:clamp(72px,18vw,96px);
      border-radius:24px;
      object-fit:cover;
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-kicker{
      margin:16px 0 8px;
      text-transform:uppercase;
      letter-spacing:0.18em;
      font-size:12px;
      color:var(--muted);
    }
    .landing-hero-title{
      margin:0;
      font-size:clamp(28px,7vw,44px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-hero-subtitle{
      margin:12px auto;
      max-width:52ch;
      color:var(--muted);
      font-size:clamp(14px,3.6vw,18px);
      line-height:1.6;
    }
    .landing-hero-tagline{
      margin:0 auto;
      max-width:60ch;
      font-size:clamp(13px,3.4vw,16px);
      line-height:1.6;
    }
    .landing-bands{
      display:flex;
      flex-direction:column;
      gap:clamp(18px,4vw,28px);
    }
    .landing-band{
      position:relative;
      display:grid;
      gap:clamp(20px,4.4vw,34px);
      padding:clamp(26px,5vw,38px);
      border-radius:var(--radius-lg);
      background:linear-gradient(135deg,#ffffff 0%,rgba(253,254,255,0.92) 100%);
      border:1px solid var(--line);
      box-shadow:var(--shadow-lg);
    }
    .landing-band::before{
      content:'';
      position:absolute;
      inset:auto 24px 24px auto;
      width:120px;
      height:120px;
      border-radius:36px;
      background:radial-gradient(circle at center, var(--band-accent-soft, rgba(57,255,20,0.16)) 0%, transparent 70%);
      opacity:0.6;
      pointer-events:none;
    }
    .landing-band-top{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:clamp(18px,3vw,28px);
      position:relative;
      z-index:1;
    }
    .landing-band-logo{
      width:88px;
      height:88px;
      border-radius:24px;
      background:var(--band-accent-soft, rgba(57,255,20,0.18));
      border:2px solid rgba(19,22,36,0.06);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:24px;
      letter-spacing:0.08em;
      color:var(--ink);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }
    .landing-band-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .landing-band-logo[data-empty="true"]{
      color:rgba(19,22,36,0.7);
      background:linear-gradient(135deg,var(--band-accent-soft, rgba(57,255,20,0.18)), rgba(255,255,255,0.92));
    }
    .landing-band-info{
      flex:1;
      min-width:220px;
    }
    .landing-band-tag{
      margin:0 0 6px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.2em;
      color:var(--muted);
    }
    .landing-band-name{
      margin:0;
      font-size:clamp(24px,6vw,36px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-band-description{
      margin:12px 0 0;
      max-width:60ch;
      color:rgba(19,22,36,0.72);
      font-size:clamp(14px,3.6vw,17px);
      line-height:1.65;
    }
    .landing-band-content{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:clamp(18px,4vw,28px);
      position:relative;
      z-index:1;
    }
    .landing-band-links{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:12px;
    }
    .landing-link{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:var(--radius-md);
      background:#ffffff;
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
      text-decoration:none;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .landing-link:hover{
      transform:translateY(-2px);
      border-color:var(--band-accent,#bf12eb);
      box-shadow:0 16px 36px rgba(19,22,36,0.12);
    }
    .landing-link-icon{
      width:26px;
      height:26px;
      display:grid;
      place-items:center;
      color:currentColor;
    }
    .landing-link-label{
      font-weight:600;
      font-size:15px;
      letter-spacing:0.01em;
    }
    .landing-band-release{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:16px;
      align-items:center;
      padding:18px 20px;
      border-radius:var(--radius-md);
      background:linear-gradient(180deg,#ffffff 0%,rgba(246,248,253,0.95) 100%);
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-band-release-art{
      width:80px;
      aspect-ratio:1;
      border-radius:18px;
      background:var(--band-accent-soft, rgba(57,255,20,0.18));
      border:1px solid rgba(19,22,36,0.06);
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:rgba(19,22,36,0.5);
      overflow:hidden;
      padding:8px;
    }
    .landing-band-release-info{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .landing-band-release-eyebrow{
      font-size:11px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .landing-band-release-title{
      margin:0;
      font-size:17px;
      font-weight:600;
      letter-spacing:-0.01em;
    }
    .landing-band-release-subtitle{
      margin:0;
      color:rgba(19,22,36,0.65);
      font-size:14px;
      line-height:1.45;
    }
    .landing-band-release-link{
      margin-top:4px;
      font-size:13px;
      font-weight:600;
      color:var(--band-accent,#39FF14);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .landing-band-release-link::after{
      content:'↗';
      font-size:13px;
    }
    .landing-band-release-control{
      position:relative;
      width:72px;
      height:72px;
      border:none;
      background:none;
      padding:0;
      cursor:pointer;
      --progress:0deg;
    }
    .landing-band-release-control::before{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:50%;
      background:conic-gradient(var(--band-accent,#39FF14) var(--progress), rgba(19,22,36,0.12) var(--progress));
      transition:background .15s linear;
    }
    .landing-band-release-control::after{
      content:'';
      position:absolute;
      inset:0;
      border-radius:50%;
      background:#ffffff;
      box-shadow:0 12px 28px rgba(19,22,36,0.12);
    }
    .landing-band-release-icon{
      position:relative;
      z-index:1;
      font-size:22px;
      color:var(--ink);
      transition:transform .15s ease;
    }
    .landing-band-release-control[data-state="playing"] .landing-band-release-icon{
      transform:translateX(1px);
    }
    .landing-band-release-control:focus-visible{
      outline:2px solid var(--band-accent,#39FF14);
      outline-offset:4px;
    }
    .landing-band-release-audio{display:none}
    .landing-band-connect{
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .landing-band-connect-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.18em;
      color:var(--muted);
    }
    .landing-band-extras{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .landing-connect-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(19,22,36,0.12);
      background:#ffffff;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      letter-spacing:0.02em;
      box-shadow:var(--shadow-sm);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .landing-connect-btn:hover{
      transform:translateY(-1px);
      border-color:var(--band-accent,#39FF14);
      box-shadow:0 14px 32px rgba(19,22,36,0.12);
    }
    .landing-connect-icon{
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      color:currentColor;
    }
    .landing-actions-wrap{
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .landing-section-title{
      margin:0;
      font-size:14px;
      font-weight:600;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .landing-actions{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }
    .landing-card{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:18px 20px;
      border-radius:var(--radius-md);
      background:#ffffff;
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
      text-decoration:none;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .landing-card:hover{
      transform:translateY(-2px);
      border-color:rgba(19,22,36,0.16);
      box-shadow:0 16px 36px rgba(19,22,36,0.12);
    }
    .landing-card-icon{
      width:26px;
      height:26px;
      display:grid;
      place-items:center;
      color:currentColor;
    }
    .landing-card-label{
      flex:1;
      font-weight:600;
      font-size:16px;
    }
    .landing-card-arrow{opacity:0.5}
    .landing-hero,
    .landing-band,
    .landing-card{opacity:0}
    .landing-auth{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin:0 0 14px;
    }
    .landing-auth-btn{
      appearance:none;
      border:1px solid rgba(19,22,36,0.12);
      background:#ffffff;
      color:var(--ink);
      border-radius:999px;
      padding:8px 14px;
      font-weight:600;
      cursor:pointer;
      box-shadow:var(--shadow-sm);
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .landing-auth-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(19,22,36,0.22);
      box-shadow:0 12px 24px rgba(19,22,36,0.12);
    }
    .landing-auth-btn:active{transform:translateY(0)}
    .flag-holiday .landing-hero-title{
      background:linear-gradient(90deg,#39FF14,#00B1FF,#FF2BD6);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    @media (max-width:540px){
      .landing-bands .landing-band[data-band-id="the-great-reunion"]{
        order:-1;
      }
    }
    @media (max-width:640px){
      .landing-band-release{
        grid-template-columns:1fr;
        text-align:center;
      }
      .landing-band-release-art,
      .landing-band-release-control{
        margin:0 auto;
      }
    }
    @media (min-width: 992px) and (orientation: landscape){
      .landing-bands{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:clamp(20px,4vw,32px);
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div id="app"></div>
  </div>
</body>
</html>
