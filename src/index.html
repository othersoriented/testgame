    <style>
    :root{
      --bg:#f4f5f8;
      --bg-soft:#e7ebf3;
      --ink:#131624;
      --muted:#5e6476;
      --line:rgba(19,22,36,0.12);
      --radius-lg:28px;
      --radius-md:16px;
      --shadow-lg:0 18px 44px rgba(19,22,36,0.12);
      --shadow-sm:0 12px 28px rgba(19,22,36,0.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing:antialiased;
      color:var(--ink);
      background:
        radial-gradient(1400px 520px at -5% -10%, rgba(231,235,243,0.65), transparent 65%),
        radial-gradient(1200px 540px at 105% 0%, rgba(221,226,238,0.6), transparent 60%),
        linear-gradient(180deg,#ffffff 0%, var(--bg) 100%);
      padding:clamp(18px,4vw,36px);
      min-height:100svh;
      position:relative;
    }
    a{color:inherit}
    .landing-bg-video{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
      pointer-events:none;
      opacity:0.35;
      filter:saturate(0.8);
    }
    .landing-bg-overlay{
      position:fixed;
      inset:0;
      background:rgba(244,245,248,0.55);
      z-index:-1;
      pointer-events:none;
    }
    .landing{
      margin:0 auto;
      max-width:min(1100px,100%);
      display:flex;
      flex-direction:column;
      gap:clamp(18px,4vw,32px);
    }
    #app{
      display:flex;
      flex-direction:column;
      gap:clamp(26px,6vw,48px);
    }
    .landing-hero{
      text-align:center;
      padding:clamp(26px,6vw,42px);
      border-radius:var(--radius-lg);
      background:linear-gradient(180deg,#ffffff 0%,rgba(244,246,252,0.92) 100%);
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-avatar{
      width:clamp(72px,18vw,96px);
      height:clamp(72px,18vw,96px);
      border-radius:24px;
      object-fit:cover;
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-kicker{
      margin:16px 0 8px;
      text-transform:uppercase;
      letter-spacing:0.18em;
      font-size:12px;
      color:var(--muted);
    }
    .landing-hero-title{
      margin:0;
      font-size:clamp(28px,7vw,44px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-hero-subtitle{
      margin:12px auto;
      max-width:52ch;
      color:var(--muted);
      font-size:clamp(14px,3.6vw,18px);
      line-height:1.6;
    }
    .landing-hero-tagline{
      margin:0 auto;
      max-width:60ch;
      font-size:clamp(13px,3.4vw,16px);
      line-height:1.6;
    }
    .landing-hero-actions{
      margin:clamp(18px,4vw,24px) auto 0;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
    }
    .landing-hero-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 22px;
      border-radius:999px;
      font-weight:600;
      font-size:15px;
      letter-spacing:0.01em;
      text-decoration:none;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
      border:1px solid transparent;
    }
    .landing-hero-btn span{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .landing-hero-btn svg{
      width:18px;
      height:18px;
    }
    .landing-hero-btn--primary{
      background:var(--ink);
      color:#ffffff;
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-btn--primary:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 32px rgba(19,22,36,0.24);
    }
    .landing-hero-btn--secondary{
      background:#ffffff;
      color:var(--ink);
      border-color:rgba(19,22,36,0.12);
      box-shadow:var(--shadow-sm);
    }
    .landing-hero-btn--secondary:hover{
      transform:translateY(-2px);
      border-color:rgba(19,22,36,0.22);
      box-shadow:0 16px 32px rgba(19,22,36,0.16);
    }
    .landing-hero-btn--link{
      background:transparent;
      color:var(--ink);
      border-color:transparent;
      box-shadow:none;
      padding:0;
    }
    .landing-hero-btn--link:hover{
      transform:none;
      color:#0b5cff;
    }
    .landing-hero-highlights{
      margin:clamp(18px,4vw,28px) auto 0;
      padding:18px clamp(14px,3vw,20px);
      border-radius:var(--radius-md);
      background:rgba(244,246,252,0.7);
      border:1px solid rgba(19,22,36,0.08);
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:clamp(12px,4vw,18px);
    }
    .landing-hero-highlight{
      min-width:160px;
      display:flex;
      flex-direction:column;
      gap:4px;
      text-align:center;
    }
    .landing-hero-highlight-value{
      font-size:clamp(18px,4.5vw,24px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-hero-highlight-label{
      font-size:13px;
      color:var(--muted);
    }
    .landing-announcement{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      background:linear-gradient(135deg, rgba(227,39,39,0.08), rgba(23,128,68,0.08));
      border:1px solid rgba(19,22,36,0.1);
      box-shadow:0 6px 18px rgba(19,22,36,0.08);
      font-size:14px;
      max-width:100%;
    }
    .landing-announcement-text{
      flex:1 1 auto;
      color:var(--ink);
      font-weight:600;
      line-height:1.4;
    }
    .landing-announcement-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid rgba(19,22,36,0.12);
      font-weight:650;
      text-decoration:none;
      color:var(--ink);
      box-shadow:var(--shadow-sm);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      white-space:normal;
      justify-content:flex-start;
    }
    .landing-announcement-btn svg{width:18px; height:18px;}
    .landing-announcement-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(19,22,36,0.2);
      box-shadow:0 14px 30px rgba(19,22,36,0.14);
    }
    @media (max-width: 640px){
      .landing-announcement{
        border-radius:12px;
        gap:8px;
      }
      .landing-announcement-text{
        font-size:13px;
        line-height:1.5;
      }
      .landing-announcement-btn{
        width:100%;
      }
    }
    @media (min-width: 800px){
      .landing-announcement{
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:12px 16px;
      }
      .landing-announcement-text{
        font-size:14px;
      }
      .landing-announcement-btn{
        width:auto;
      }
    }
    .landing-moods{
      padding:clamp(18px,3vw,26px);
      border-radius:var(--radius-lg);
      background:#ffffff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-sm);
    }
    .landing-moods-heading h2{
      margin:0;
      font-size:22px;
    }
    .landing-moods-heading p{
      margin:6px 0 16px;
      color:var(--muted);
      font-size:14px;
    }
    .landing-mood-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:12px;
    }
    .landing-mood{
      padding:16px;
      border-radius:var(--radius-md);
      border:1px solid rgba(19,22,36,0.1);
      background:linear-gradient(180deg, rgba(244,246,252,0.9) 0%, #ffffff 100%);
      text-decoration:none;
      color:inherit;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      box-shadow:var(--shadow-sm);
    }
    .landing-mood:hover{
      transform:translateY(-2px);
      border-color:var(--mood-accent, var(--ink));
      box-shadow:0 12px 24px rgba(19,22,36,0.12);
    }
    .landing-mood-top{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
    }
    .landing-mood-cover{
      width:72px;
      height:72px;
      border-radius:12px;
      background-size:cover;
      background-position:center;
      border:1px solid rgba(19,22,36,0.12);
      box-shadow:var(--shadow-sm);
    }
    .landing-mood-label{
      margin:0;
      font-weight:700;
      font-size:17px;
      letter-spacing:-0.01em;
    }
    .landing-mood-band{
      margin:0;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }
    .landing-mood-description{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .landing-mood-cta{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-weight:650;
      color:var(--mood-accent, var(--ink));
      margin-top:auto;
    }
    .landing-mood-cta svg{width:18px; height:18px;}
    .landing-bands{
      display:flex;
      flex-direction:column;
      gap:clamp(18px,4vw,28px);
    }
    .landing-band{
      position:relative;
      display:grid;
      gap:clamp(20px,4.4vw,34px);
      padding:clamp(26px,5vw,38px);
      border-radius:var(--radius-lg);
      background:linear-gradient(135deg,#ffffff 0%,rgba(253,254,255,0.92) 100%);
      border:1px solid var(--line);
      box-shadow:var(--shadow-lg);
    }
    .landing-band::before{
      content:'';
      position:absolute;
      inset:auto 24px 24px auto;
      width:120px;
      height:120px;
      border-radius:36px;
      background:radial-gradient(circle at center, var(--band-accent-soft, rgba(57,255,20,0.16)) 0%, transparent 70%);
      opacity:0.6;
      pointer-events:none;
    }
    .landing-band-top{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:clamp(18px,3vw,28px);
      position:relative;
      z-index:1;
    }
    .landing-band-logo{
      width:88px;
      height:88px;
      border-radius:24px;
      background:var(--band-accent-soft, rgba(57,255,20,0.18));
      border:2px solid rgba(19,22,36,0.06);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:24px;
      letter-spacing:0.08em;
      color:var(--ink);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }
    .landing-band-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .landing-band-logo[data-empty="true"]{
      color:rgba(19,22,36,0.7);
      background:linear-gradient(135deg,var(--band-accent-soft, rgba(57,255,20,0.18)), rgba(255,255,255,0.92));
    }
    .landing-band-info{
      flex:1;
      min-width:220px;
    }
    .landing-band-tag{
      margin:0 0 6px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.2em;
      color:var(--muted);
    }
    .landing-band-name{
      margin:0;
      font-size:clamp(24px,6vw,36px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-band-description{
      margin:12px 0 0;
      max-width:60ch;
      color:rgba(19,22,36,0.72);
      font-size:clamp(14px,3.6vw,17px);
      line-height:1.65;
    }
    .landing-band-content{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:clamp(18px,4vw,28px);
      position:relative;
      z-index:1;
    }
    .landing-band-links{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:12px;
    }
    .landing-link{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:var(--radius-md);
      background:#ffffff;
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
      text-decoration:none;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .landing-link:hover{
      transform:translateY(-2px);
      border-color:var(--band-accent,#bf12eb);
      box-shadow:0 16px 36px rgba(19,22,36,0.12);
    }
    .landing-link-icon{
      width:26px;
      height:26px;
      display:grid;
      place-items:center;
      color:currentColor;
    }
    .landing-link-label{
      font-weight:600;
      font-size:15px;
      letter-spacing:0.01em;
    }
    .landing-band-release{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:16px;
      align-items:center;
      padding:18px 20px;
      border-radius:var(--radius-md);
      background:linear-gradient(180deg,#ffffff 0%,rgba(246,248,253,0.95) 100%);
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-band-release-art{
      width:80px;
      aspect-ratio:1;
      border-radius:18px;
      background:var(--band-accent-soft, rgba(57,255,20,0.18));
      border:1px solid rgba(19,22,36,0.06);
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:rgba(19,22,36,0.5);
      overflow:hidden;
      padding:8px;
    }
    .landing-band-release-info{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .landing-band-release-eyebrow{
      font-size:11px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .landing-band-release-title{
      margin:0;
      font-size:17px;
      font-weight:600;
      letter-spacing:-0.01em;
    }
    .landing-band-release-subtitle{
      margin:0;
      color:rgba(19,22,36,0.65);
      font-size:14px;
      line-height:1.45;
    }
    .landing-band-release-date{
      font-size:12px;
      color:rgba(19,22,36,0.5);
      letter-spacing:0.06em;
      text-transform:uppercase;
    }
    .landing-band-release-control{
      position:relative;
      width:72px;
      height:72px;
      border:none;
      background:none;
      padding:0;
      cursor:pointer;
      --progress:0deg;
    }
    .landing-band-release-control::before{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:50%;
      background:conic-gradient(var(--band-accent,#39FF14) var(--progress), rgba(19,22,36,0.12) var(--progress));
      transition:background .15s linear;
    }
    .landing-band-release-control::after{
      content:'';
      position:absolute;
      inset:0;
      border-radius:50%;
      background:#ffffff;
      box-shadow:0 12px 28px rgba(19,22,36,0.12);
    }
    .landing-band-release-icon{
      position:relative;
      z-index:1;
      font-size:22px;
      color:var(--ink);
      transition:transform .15s ease;
    }
    .landing-band-release-control[data-state="playing"] .landing-band-release-icon{
      transform:translateX(1px);
    }
    .landing-band-release-control:focus-visible{
      outline:2px solid var(--band-accent,#39FF14);
      outline-offset:4px;
    }
    .landing-band-release-audio{display:none}
    .landing-band-merch{
      display:grid;
      gap:12px;
      padding:20px;
      border-radius:var(--radius-md);
      background:linear-gradient(135deg,#ffffff 0%,rgba(246,248,253,0.95) 100%);
      border:1px solid rgba(19,22,36,0.08);
      box-shadow:var(--shadow-sm);
    }
    .landing-band-merch-eyebrow{
      margin:0;
      font-size:12px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      font-weight:600;
      color:var(--muted);
    }
    .landing-band-merch h3{
      margin:0;
      font-size:clamp(18px,4.5vw,24px);
      font-weight:700;
      letter-spacing:-0.01em;
    }
    .landing-band-merch p{
      margin:0;
      color:var(--muted);
      font-size:clamp(14px,3.2vw,16px);
      line-height:1.6;
    }
    .landing-band-merch-embed{
      width:100%;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(19,22,36,0.08);
      background:#ffffff;
      box-shadow:0 16px 40px rgba(19,22,36,0.12);
    }
    .landing-band-merch-embed iframe{
      width:100%;
      border:0;
      height:clamp(320px, 110vw, 520px);
      display:block;
    }
    .landing-share-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid rgba(19,22,36,0.12);
      background:#ffffff;
      color:var(--ink);
      padding:8px 12px;
      border-radius:999px;
      font-weight:600;
      font-size:13px;
      cursor:pointer;
      box-shadow:var(--shadow-sm);
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      margin-left:auto;
    }
    .landing-share-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(19,22,36,0.22);
      box-shadow:0 12px 26px rgba(19,22,36,0.12);
    }
    .landing-share-btn[data-copied="true"] span:last-child::after{
      content:' \2713';
      color:var(--band-accent,#39FF14);
    }
    .landing-share-icon{
      display:grid;
      place-items:center;
      width:18px;
      height:18px;
      color:var(--ink);
    }
    .landing-band-connect{
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .landing-band-connect-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.18em;
      color:var(--muted);
    }
    .landing-band-extras{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .landing-connect-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(19,22,36,0.12);
      background:#ffffff;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      letter-spacing:0.02em;
      box-shadow:var(--shadow-sm);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .landing-connect-btn:hover{
      transform:translateY(-1px);
      border-color:var(--band-accent,#39FF14);
      box-shadow:0 14px 32px rgba(19,22,36,0.12);
    }
    .landing-connect-icon{
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      color:currentColor;
    }
    .landing-band-social{
      display:grid;
      gap:12px;
      padding:18px clamp(14px,3vw,20px);
      border-radius:var(--radius-md);
      background:linear-gradient(135deg, rgba(57,255,20,0.12) 0%, rgba(0,177,255,0.08) 100%);
      border:1px solid rgba(19,22,36,0.06);
    }
    .landing-band-social-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:0.14em;
      color:var(--muted);
    }
    .landing-band-social-items{
      display:grid;
      gap:10px;
    }
    .landing-band-social-item{
      display:grid;
      gap:6px;
      text-align:left;
    }
    .landing-band-social-quote{
      font-size:15px;
