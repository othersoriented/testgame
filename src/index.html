<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lost Boy Found — Arcade</title>
  <meta name="description" content="Pick a game: Flappy Praise (Phaser) or Lyric Ninja (Canvas)." />
  <style>
    :root { --fg:#111; --bg:#fff; --muted:#666; --card:#f6f7f9; --ring:#39FF14; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--fg); }
    .wrap { max-width: 880px; margin: 48px auto; padding: 0 16px; }
    h1 { font-size: 1.8rem; margin: 0 0 24px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .card { display:block; padding:20px; border-radius:12px; background:var(--card); text-decoration:none; color:inherit; border:2px solid transparent; transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease; }
    .card:hover { transform: translateY(-2px); border-color:var(--ring); box-shadow: 0 6px 18px rgba(0,0,0,.08); }
    .eyebrow { font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    h2 { margin: 0 0 8px; font-size:1.25rem; }
    p { margin:0; color:var(--muted); }
    footer { margin-top:32px; color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Lost Boy Found — Arcade</h1>
    <div class="grid">
      <a class="card" href="game.html">
        <div class="eyebrow">Phaser</div>
        <h2>Flappy Praise</h2>
        <p>Tap to fly. Classic arcade physics with your soundtrack.</p>
      </a>
      <a class="card" href="ninja/index.html">
        <div class="eyebrow">Canvas</div>
        <h2>Lyric Ninja</h2>
        <p>Slice falling lyrics in time with the music.</p>
      </a>
    </div>
    <footer>Tip: Bookmark this page to switch games quickly.</footer>
  </main>
</body>
</html>
