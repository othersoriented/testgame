version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - echo "=== DIST TOP ==="
        - ls -al dist
        - echo "=== DIST/NINJA ==="
        - ls -al dist/ninja || true
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
